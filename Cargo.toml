cargo-features = ["codegen-backend"]

[workspace]
#members = ["site", "site_*"]
members = ["ev_site*"]
resolver = "3"
default-members = ["ev_site"]

[workspace.lints.clippy]
float_cmp = "allow"
len_zero = "allow"
undocumented_unsafe_blocks = "warn"
tabs_in_doc_comments = "allow"
doc_lazy_continuation = "allow"
get_first = "allow"
get_last_with_len = "allow"
manual_is_multiple_of = "allow"

[workspace.lints.rust]
unused_features = "allow"

[workspace.dependencies]
clap = { version = "^4.5.4", features = ["derive"] }
color-eyre = "^0.6.5"
derive-new = "^0"
dioxus = "0.7"
ev_site_macros = { path = "ev_site_macros" }
miette = { version = "^7.6.0", features = ["fancy", "serde", "syntect-highlighter"] }
proc-macro2 = "1"
quote = "1"
serde = { version = "^1", features = ["derive"] }
syn = "2"
ui_test = "0.30"
v_utils = { version = "^2.15.0", features = ["io", "macros", "cli"] }

# Pull `default_field_values` macro support directly from the local v_utils checkout
# until those changes are released on crates.io.
[patch.crates-io]
v_utils = { path = "/home/v/s/v_utils/v_utils" }
v_utils_macros = { path = "/home/v/s/v_utils/v_utils_macros" }
