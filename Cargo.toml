cargo-features = ["codegen-backend"]

[workspace]
members = ["ev_site", "ev_site_*"]
resolver = "3"

[workspace.lints.clippy]
float_cmp = "allow"
len_zero = "allow"
undocumented_unsafe_blocks = "warn"
tabs_in_doc_comments = "allow"
doc_lazy_continuation = "allow"
get_first = "allow"
get_last_with_len = "allow"
manual_is_multiple_of = "allow"

[workspace.lints.rust]
unused_features = "allow"

[workspace.dependencies]
clap = { version = "^4.6.1", features = ["derive"] }
color-eyre = "^0.6.5"
derive-new = "^0"
dioxus = "0.7"
ev_site_macros = { path = "ev_site_macros" }
lucide-dioxus = { version = "3.11", features = ["all-icons"] }
miette = { version = "^7.6.0", features = ["fancy", "serde", "syntect-highlighter"] }
proc-macro2 = "1"
quote = "1"
serde = { version = "^1", features = ["derive"] }
serde_json = "1"
shadcn_ui = { git = "https://github.com/MBeliou/shadcn-dioxus", rev = "617ee8b188935e18c7dc0058bf47e2fe095b4f0d", package = "ui" }
syn = "2"
ui_test = "0.30"
v_utils = { version = "^2.15.43", features = ["io", "macros", "cli"] }
